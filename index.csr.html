<!DOCTYPE html>
<html lang="en" data-beasties-container=""> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>FortDice</title>
    <meta name="description" content="Fort Dice delivers enterprise-grade software solutions.">
    <link rel="icon" href="icon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Lenis Essential CSS */
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }

        /* Clean UI styles */
        ::-webkit-scrollbar { width: 0px; display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; background: white; }

        /* --- 1. SIDE SCROLL PROGRESS --- */
        #scroll-progress-container {
            position: fixed;
            top: 0; right: 0;
            width: 4px; height: 100%;
            background: rgba(0, 0, 0, 0.03);
            z-index: 2000;
        }
        #scroll-progress-bar {
            width: 100%; height: 0%;
            background: #8c8cf8;
            box-shadow: 0 0 10px rgba(140, 140, 248, 0.4);
        }

        /* --- 2. PRELOADER --- */
        #preloader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
            transition: opacity 0.6s ease;
        }
        .loader-logo {
            width: 40px; height: 40px;
            border: 3px solid rgba(140, 140, 248, 0.1);
            border-top-color: #8c8cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- 3. BACK TO TOP --- */
        #backToTop {
            position: fixed;
            bottom: 30px; right: 20px;
            background: #8c8cf8; color: white;
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            visibility: hidden; opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1500;
            cursor: pointer;
        }
        #backToTop.show { visibility: visible; opacity: 1; transform: translateY(0); }
    </style>
<link rel="stylesheet" href="styles-5INURTSO.css"></head>
<body class="antialiased" ngcm="">

    <div id="preloader">
        <div class="loader-logo"></div>
    </div>

    <div id="scroll-progress-container">
        <div id="scroll-progress-bar"></div>
    </div>

    <button id="backToTop" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

   <app-root></app-root>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script> 

    <script>
        (function() {
            "use strict";

            // --- 1. INITIALIZE LENIS (Smooth Scroll) ---
            const lenis = new Lenis({
                duration: 1.2,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
                smoothWheel: true,
                wheelMultiplier: 1.1,
            });

            // Sync AOS with Lenis scroll
            lenis.on('scroll', () => {
                AOS.refresh();
            });

            function raf(time) {
                lenis.raf(time);
                requestAnimationFrame(raf);
            }
            requestAnimationFrame(raf);

            // --- 2. PRELOADER LOGIC ---
            const preloader = document.getElementById('preloader');
            window.addEventListener('load', () => {
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 600);
            });

            // --- 3. SCROLL PROGRESS & BACK TO TOP ---
            const progressBar = document.getElementById('scroll-progress-bar');
            const btt = document.getElementById("backToTop");

            lenis.on('scroll', (e) => {
                // Calculate Progress
                const progress = (e.animatedScroll / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
                progressBar.style.height = `${progress}%`;

                // Show/Hide Back to Top
                if (e.animatedScroll > 400) {
                    btt.classList.add("show");
                } else {
                    btt.classList.remove("show");
                }
            });

            // Smooth Scroll to Top on Click
            btt.addEventListener("click", () => {
                lenis.scrollTo(0, { duration: 1.5 });
            });

            // --- 4. AOS INIT ---
            window.addEventListener('load', () => {
                AOS.init({ 
                    once: true, 
                    duration: 800,
                    offset: 100
                });
            });
        })();
    </script>
<script src="main-DVQMVFEL.js" type="module"></script></body>
</html>
